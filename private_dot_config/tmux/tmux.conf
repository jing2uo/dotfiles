# ============================
# 基础设置
# ============================

# 设置默认 shell 为 zsh
set-option -g default-shell /bin/zsh

# 启用真彩色支持
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# 历史记录行数
set -g history-limit 100000

# 启用鼠标支持
set -g mouse on

# 复制到系统剪贴板
set -g set-clipboard on

# 窗口和面板编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# 解绑默认前缀键
unbind C-b

# 设置前缀键为 F12（对应 zellij 的 SwitchToMode "Tmux"）
set -g prefix F12
bind F12 send-prefix

# 快速重载配置文件
bind r source-file ~/.config/tmux/tmux.conf \; display "配置已重载！"

# m: 水平分割（新窗格在下方）
bind m split-window -v -c "#{pane_current_path}"
# n: 垂直分割（新窗格在右侧）
bind n split-window -h -c "#{pane_current_path}"
# b: 新建窗口（标签页）
bind b new-window -c "#{pane_current_path}"
# z: 切换全屏
bind z resize-pane -Z
# x: 关闭当前窗格
bind x kill-pane

# ---- Vim 风格的窗格导航 ----
# i/k/j/l: 上/下/左/右移动焦点
bind i select-pane -U
bind k select-pane -D
bind j select-pane -L
bind l select-pane -R


# 减少延迟
set -sg escape-time 0

# 增加显示时间
set -g display-time 2000
set -g display-panes-time 2000

# 启用焦点事件（让 vim 等编辑器正确响应）
set -g focus-events on

set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'

run '/usr/share/tmux-plugin-manager/tpm'
